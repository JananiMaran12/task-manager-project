{% extends "base.html" %}

{% block content %}

<h3>Your Tasks</h3>

<a href="/create" class="btn btn-primary mb-3">Add Task</a>

<table class="table table-bordered">

<tr>
<th>Title</th>
<th>Description</th>
<th>Status</th>
<th>Action</th>
</tr>

{% for task in tasks %}

<tr>

<td>{{task.title}}</td>

<td>{{task.description}}</td>

<td>{{task.status}}</td>

<td>

<a class="btn btn-warning btn-sm"
href="/edit/{{task.id}}">Edit</a>

<a class="btn btn-danger btn-sm"
href="/delete/{{task.id}}">Delete</a>

</td>

</tr>

{% endfor %}

</table>

{% endblock %}
